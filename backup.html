<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Genome</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-sans, system-ui, sans-serif); background: var(--surface-0, #f1f0ee); color: var(--text-primary, #0b0b0b); min-height: 100vh; overflow-x: hidden; }

  :root {
    --genome-primary: #2a78d6;
    --genome-success: #1baf7a;
    --genome-warning: #eda100;
    --genome-danger: #e34948;
    --genome-purple: #4a3aa7;
    --radius-card: 12px;
  }

  .app-shell { display: flex; min-height: 100vh; }

  .sidebar { width: 220px; min-width: 220px; background: var(--surface-2, #fff); border-right: 0.5px solid var(--border, rgba(0,0,0,0.1)); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .sidebar-logo { padding: 18px 16px 12px; border-bottom: 0.5px solid var(--border, rgba(0,0,0,0.1)); }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #2a78d6, #4a3aa7); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
  .logo-icon svg { width: 18px; height: 18px; fill: #fff; }
  .logo-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .logo-tag { font-size: 10px; color: var(--text-muted, #898781); margin-top: 1px; }

  .nav-section { padding: 12px 8px 4px; }
  .nav-label { font-size: 10px; font-weight: 500; color: var(--text-muted, #898781); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 8px; margin-bottom: 4px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--radius, 8px); cursor: pointer; font-size: 13px; color: var(--text-secondary, #52514e); transition: all 0.15s; margin-bottom: 1px; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--surface-1, #f8f8f7); color: var(--text-primary); }
  .nav-item.active { background: #e8f0fb; color: #2a78d6; }
  .nav-item i { font-size: 15px; }
  .nav-badge { margin-left: auto; background: var(--genome-danger); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar { background: var(--surface-2, #fff); border-bottom: 0.5px solid var(--border, rgba(0,0,0,0.1)); padding: 10px 24px; display: flex; align-items: center; gap: 12px; }
  .page-title { font-size: 15px; font-weight: 500; }
  .breadcrumb { font-size: 12px; color: var(--text-muted); margin-left: 8px; }
  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--radius, 8px); font-size: 13px; cursor: pointer; border: 0.5px solid var(--border-strong, rgba(0,0,0,0.2)); background: var(--surface-2, #fff); color: var(--text-primary); transition: all 0.15s; font-family: inherit; }
  .btn:hover { background: var(--surface-1, #f8f8f7); }
  .btn-primary { background: #2a78d6; color: #fff; border-color: #2a78d6; }
  .btn-primary:hover { background: #1d5fa8; border-color: #1d5fa8; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #2a78d6, #4a3aa7); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 500; }

  .content { flex: 1; overflow-y: auto; padding: 24px; }

  .page { display: none; }
  .page.active { display: block; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi-card { background: var(--surface-2, #fff); border: 0.5px solid var(--border, rgba(0,0,0,0.1)); border-radius: var(--radius-card); padding: 16px; }
  .kpi-label { font-size: 11px; color: var(--text-muted, #898781); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .kpi-value { font-size: 26px; font-weight: 500; line-height: 1; }
  .kpi-delta { font-size: 11px; margin-top: 4px; display: flex; align-items: center; gap: 3px; }
  .delta-up { color: #1baf7a; }
  .delta-down { color: #e34948; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }

  .card { background: var(--surface-2, #fff); border: 0.5px solid var(--border, rgba(0,0,0,0.1)); border-radius: var(--radius-card); padding: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { font-size: 13px; font-weight: 500; }
  .card-muted { font-size: 11px; color: var(--text-muted); }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-success { background: #e8f8f1; color: #0d8a5e; }
  .badge-warning { background: #fef8e7; color: #b07a00; }
  .badge-danger { background: #fdeaea; color: #b03030; }
  .badge-info { background: #e8f0fb; color: #1a5fa8; }
  .badge-purple { background: #eeedf8; color: #3a2d8a; }

  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-green { background: #1baf7a; }
  .dot-yellow { background: #eda100; }
  .dot-red { background: #e34948; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { font-size: 11px; font-weight: 500; color: var(--text-muted, #898781); text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 12px; text-align: left; border-bottom: 0.5px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--border, rgba(0,0,0,0.07)); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-1, #f8f8f7); }

  .confidence-bar { height: 4px; border-radius: 2px; background: var(--surface-1, #f0efec); overflow: hidden; }
  .confidence-fill { height: 100%; border-radius: 2px; }

  .integrity-gauge { width: 80px; height: 80px; position: relative; }
  .integrity-gauge svg { width: 80px; height: 80px; }

  .activity-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border, rgba(0,0,0,0.07)); }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
  .ai-icon { background: #e8f0fb; color: #2a78d6; }
  .check-icon { background: #e8f8f1; color: #1baf7a; }
  .warn-icon { background: #fef8e7; color: #eda100; }
  .err-icon { background: #fdeaea; color: #e34948; }
  .activity-body { flex: 1; }
  .activity-text { font-size: 12px; color: var(--text-primary); line-height: 1.4; }
  .activity-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .pipeline-step { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
  .pipeline-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pipeline-line { width: 1px; height: 20px; background: var(--border); margin-left: 4.5px; }
  .pipeline-label { font-size: 12px; }
  .pipeline-count { margin-left: auto; font-size: 12px; font-weight: 500; }
  .pipeline-status { font-size: 11px; color: var(--text-muted); }

  .upload-zone { border: 1.5px dashed var(--border-strong, rgba(0,0,0,0.2)); border-radius: var(--radius-card); padding: 40px 24px; text-align: center; background: var(--surface-1, #f8f8f7); cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover { border-color: #2a78d6; background: #f0f6ff; }
  .upload-zone i { font-size: 32px; color: var(--text-muted); display: block; margin-bottom: 10px; }
  .upload-zone p { font-size: 13px; color: var(--text-secondary); }
  .upload-zone small { font-size: 11px; color: var(--text-muted); }

  .format-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; justify-content: center; }
  .format-chip { background: var(--surface-2, #fff); border: 0.5px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--text-secondary); }

  .extraction-field { background: var(--surface-2, #fff); border: 0.5px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .field-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .field-name { font-size: 11px; color: var(--text-muted); }
  .field-value { font-size: 14px; font-weight: 500; }
  .field-conf { font-size: 11px; }

  .validation-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; }
  .val-pass { background: #e8f8f1; }
  .val-warn { background: #fef8e7; }
  .val-error { background: #fdeaea; }
  .val-icon { font-size: 14px; }
  .val-text { font-size: 12px; flex: 1; }
  .val-rule { font-size: 11px; color: var(--text-muted); }

  .dna-container { background: var(--surface-1, #f8f8f7); border-radius: 12px; padding: 20px; overflow-x: auto; }
  .dna-track { display: flex; align-items: center; gap: 4px; min-width: 600px; }
  .dna-node { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .dna-circle { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; text-align: center; border: 2px solid transparent; transition: all 0.2s; }
  .dna-circle:hover { transform: scale(1.1); }
  .dna-label { font-size: 9px; color: var(--text-muted); text-align: center; max-width: 50px; }
  .dna-connector { flex: 1; height: 2px; background: var(--border); position: relative; }
  .dna-connector::after { content: ''; position: absolute; right: -3px; top: -3px; width: 8px; height: 8px; border-top: 2px solid var(--border); border-right: 2px solid var(--border); transform: rotate(45deg); }

  .timeline-step { display: flex; gap: 16px; padding: 12px 0; position: relative; }
  .timeline-left { display: flex; flex-direction: column; align-items: center; }
  .timeline-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .timeline-vline { width: 1px; flex: 1; min-height: 20px; margin-top: 4px; }
  .timeline-body { flex: 1; padding-bottom: 8px; }
  .timeline-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .timeline-sub { font-size: 12px; color: var(--text-muted); }
  .timeline-time { font-size: 11px; color: var(--text-muted); }

  .copilot-bubble { position: fixed; bottom: 24px; right: 24px; z-index: 1000; }
  .copilot-btn { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #2a78d6, #4a3aa7); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(42,120,214,0.35); transition: all 0.2s; }
  .copilot-btn:hover { transform: scale(1.08); }
  .copilot-btn i { color: #fff; font-size: 20px; }
  .copilot-panel { position: absolute; bottom: 60px; right: 0; width: 300px; background: var(--surface-2, #fff); border: 0.5px solid var(--border); border-radius: 16px; padding: 0; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.12); display: none; }
  .copilot-panel.open { display: block; }
  .copilot-header { padding: 12px 14px; background: linear-gradient(135deg, #2a78d6, #4a3aa7); }
  .copilot-title { font-size: 13px; font-weight: 500; color: #fff; }
  .copilot-sub { font-size: 10px; color: rgba(255,255,255,0.7); }
  .copilot-messages { height: 200px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .copilot-msg { font-size: 12px; padding: 8px 10px; border-radius: 10px; max-width: 90%; }
  .copilot-msg.ai { background: #e8f0fb; color: #1a5fa8; align-self: flex-start; }
  .copilot-msg.user { background: #2a78d6; color: #fff; align-self: flex-end; }
  .copilot-suggestions { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 12px; border-top: 0.5px solid var(--border); }
  .copilot-suggest { font-size: 10px; padding: 3px 8px; border-radius: 12px; border: 0.5px solid var(--border); background: var(--surface-1); cursor: pointer; color: var(--text-secondary); transition: all 0.15s; }
  .copilot-suggest:hover { background: #e8f0fb; color: #2a78d6; border-color: #2a78d6; }
  .copilot-input-row { display: flex; gap: 6px; padding: 8px 12px; border-top: 0.5px solid var(--border); }
  .copilot-input { flex: 1; border: 0.5px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 12px; background: var(--surface-1); color: var(--text-primary); font-family: inherit; }
  .copilot-send { background: #2a78d6; color: #fff; border: none; border-radius: 8px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }

  .role-card { background: var(--surface-2, #fff); border: 1.5px solid var(--border); border-radius: var(--radius-card); padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .role-card:hover { border-color: #2a78d6; background: #f4f8ff; transform: translateY(-2px); }
  .role-card.selected { border-color: #2a78d6; background: #e8f0fb; }
  .role-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 24px; }
  .role-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .role-desc { font-size: 12px; color: var(--text-muted); }

  .scan-anim { position: relative; overflow: hidden; }
  .scan-anim::after { content: ''; position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #2a78d6, transparent); animation: scanLine 2s ease-in-out infinite; }
  @keyframes scanLine { 0% { top: 0; opacity: 1; } 100% { top: 100%; opacity: 0; } }

  .processing-step { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; background: var(--surface-1, #f8f8f7); margin-bottom: 6px; }
  .processing-step.done { background: #e8f8f1; }
  .processing-step.active { background: #e8f0fb; animation: pulse 1.5s ease infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  .processing-step.pending { opacity: 0.5; }
  .step-icon { font-size: 16px; }
  .step-label { font-size: 13px; flex: 1; }
  .step-status { font-size: 11px; }

  .insight-card { background: var(--surface-2, #fff); border: 0.5px solid var(--border); border-radius: var(--radius-card); padding: 16px; }
  .insight-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 18px; }
  .insight-value { font-size: 24px; font-weight: 500; }
  .insight-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .insight-trend { font-size: 11px; margin-top: 6px; }

  .review-card { background: var(--surface-2, #fff); border: 0.5px solid var(--border); border-radius: var(--radius-card); padding: 16px; margin-bottom: 12px; border-left: 3px solid #eda100; }
  .review-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .review-actions { display: flex; gap: 6px; margin-top: 12px; }

  .chart-wrap { position: relative; width: 100%; }

  .progress-ring { transform: rotate(-90deg); }

  input[type="text"], input[type="email"], select, textarea { border: 0.5px solid var(--border-strong, rgba(0,0,0,0.2)); border-radius: 8px; padding: 8px 12px; font-size: 13px; width: 100%; background: var(--surface-2, #fff); color: var(--text-primary); font-family: inherit; }

  .section-title { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .section-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

  .loading-bar { height: 3px; background: var(--surface-1, #f0efec); border-radius: 2px; overflow: hidden; margin: 8px 0; }
  .loading-fill { height: 100%; border-radius: 2px; background: #2a78d6; transition: width 0.5s ease; }

  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 11px; border: 0.5px solid var(--border); background: var(--surface-1); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
  .chip:hover, .chip.active { border-color: #2a78d6; background: #e8f0fb; color: #2a78d6; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 500; display: none; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface-2, #fff); border-radius: 16px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 24px; border: 0.5px solid var(--border); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-title { font-size: 16px; font-weight: 500; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-muted); padding: 4px; border-radius: 6px; }
  .modal-close:hover { background: var(--surface-1); }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: 1fr 1fr; }
  }
</style>

</head>
<body>

<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
      </div>
      <div class="logo-name">Invoice Genome</div>
      <div class="logo-tag">Decoding Every Invoice with AI</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Overview</div>
      <button class="nav-item active" onclick="showPage('dashboard')">
        <i class="ti ti-layout-dashboard"></i> Dashboard
      </button>
      <button class="nav-item" onclick="showPage('genome-timeline')">
        <i class="ti ti-timeline"></i> Genome Timeline
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-label">Processing</div>
      <button class="nav-item" onclick="showPage('upload')">
        <i class="ti ti-upload"></i> Upload
      </button>
      <button class="nav-item" onclick="showPage('extraction')">
        <i class="ti ti-dna"></i> Genome Extraction
      </button>
      <button class="nav-item" onclick="showPage('dna-viewer')">
        <i class="ti ti-topology-star"></i> DNA Viewer
      </button>
      <button class="nav-item" onclick="showPage('validation')">
        <i class="ti ti-shield-check"></i> Validation
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-label">Review</div>
      <button class="nav-item" onclick="showPage('review')">
        <i class="ti ti-eye"></i> Human Review
        <span class="nav-badge">5</span>
      </button>
      <button class="nav-item" onclick="showPage('policy')">
        <i class="ti ti-shield"></i> Policy Guardian
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-label">Invoices</div>
      <button class="nav-item" onclick="showPage('generator')">
        <i class="ti ti-file-invoice"></i> Generator
      </button>
      <button class="nav-item" onclick="showPage('dispatch')">
        <i class="ti ti-send"></i> Dispatch Center
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-label">Intelligence</div>
      <button class="nav-item" onclick="showPage('analytics')">
        <i class="ti ti-chart-bar"></i> Analytics
      </button>
      <button class="nav-item" onclick="showPage('insights')">
        <i class="ti ti-bulb"></i> Finance Insights
      </button>
    </div>

    <div class="nav-section" style="margin-top: auto;">
      <button class="nav-item">
        <i class="ti ti-settings"></i> Settings
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="page-title" id="page-title">Dashboard</span>
        <span class="breadcrumb" id="breadcrumb">Genome Intelligence</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-sm" onclick="showPage('upload')"><i class="ti ti-upload"></i> Upload</button>
        <button class="btn btn-primary btn-sm" onclick="openCopilot()"><i class="ti ti-robot"></i> AI Copilot</button>
        <div class="avatar">JD</div>
      </div>
    </header>
